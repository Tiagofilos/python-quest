<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Python Quest</title>
  <style>
    body {
      margin: 0;
      background: #050816;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 20px;
    }

    img {
      width: 100%;
      max-width: 950px;
      border-radius: 12px;
      box-shadow: 0 0 20px black;
    }

    button {
      margin: 20px 10px;
      padding: 12px 25px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1 id="titulo">Python Quest: Conde Dross</h1>

  <img id="imagem" src="/capa_pa_00.png">

  <div>
    <button onclick="voltar()">Anterior</button>
    <button onclick="proxima()">Próxima</button>
  </div>

  <script>
    const paginas = [
      { titulo: "Python Quest: Conde Dross", imagem: "/capa_pa_00.png" },
      { titulo: "Página 1", imagem: "/quadrinho_pa01.png" },
      { titulo: "Página 2", imagem: "/quadrinho_pa02.png" },
      { titulo: "Desafio 1", imagem: "/desafio_01.png" },
      { titulo: "Desafio 2", imagem: "/desafio_02.png" },
      { titulo: "Desafio 3", imagem: "/desafio_03.png" }
    ];

    let pagina = 0;

    function atualizar() {
      document.getElementById("titulo").innerText = paginas[pagina].titulo;
      document.getElementById("imagem").src = paginas[pagina].imagem;
    }

    function proxima() {
      if (pagina < paginas.length - 1) {
        pagina++;
        atualizar();
      }
    }

    function voltar() {
      if (pagina > 0) {
        pagina--;
        atualizar();
      }
    }
  </script>

</body>
</html>
