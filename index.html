<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Quest</title>

<style>
body{
margin:0;
background:#050816;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

img{
width:100%;
max-width:950px;
border-radius:12px;
box-shadow:0 0 20px black;
}

button{
padding:12px 24px;
margin:10px;
font-size:18px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

.painel{
max-width:950px;
margin:auto;
padding:20px;
border:2px solid red;
border-radius:15px;
background:#020617;
}

.bits{
display:flex;
justify-content:center;
gap:8px;
margin:15px 0;
flex-wrap:wrap;
}

.bit{
background:#111827;
padding:12px;
border-radius:8px;
font-size:28px;
min-width:40px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
margin-top:20px;
}

.item{
background:#111827;
padding:10px;
border-radius:12px;
cursor:pointer;
}

.valor{
font-size:22px;
font-weight:bold;
}

.estado{
font-size:30px;
margin-top:10px;
}

.ok{
color:#22c55e;
}
</style>
</head>

<body>

<h1 id="titulo"></h1>

<div id="conteudo"></div>

<div>
<button onclick="voltar()">Anterior</button>
<button id="btnProxima" onclick="proxima()">Próxima</button>
</div>

<audio id="musica" src="/musica_desafio.mp3" loop></audio>

<script>
const paginas = [
{tipo:"img", titulo:"Python Quest", imagem:"/capa_pa_00.png"},
{tipo:"img", titulo:"Página 1", imagem:"/quadrinho_pa01.png"},
{tipo:"img", titulo:"Página 2", imagem:"/quadrinho_pa02.png"},
{tipo:"desafio", titulo:"Desafio 1", imagem:"/desafio_01.png", meta:10},
{tipo:"desafio", titulo:"Desafio 2", imagem:"/desafio_02.png", meta:25},
{tipo:"desafio", titulo:"Desafio 3", imagem:"/desafio_03.png", meta:43}
];

const valores = [128,64,32,16,8,4,2,1];

let pagina = 0;
let bits = [0,0,0,0,0,0,0,0];

function tocarMusica(){
const m=document.getElementById("musica");
m.volume=0.35;
m.play().catch(()=>{});
}

function pararMusica(){
const m=document.getElementById("musica");
m.pause();
m.currentTime=0;
}

function soma(){
let s=0;
for(let i=0;i<bits.length;i++){
s += bits[i]*valores[i];
}
return s;
}

function atualizar(){
const atual = paginas[pagina];
document.getElementById("titulo").innerText = atual.titulo;

if(atual.tipo==="img"){
pararMusica();

document.getElementById("conteudo").innerHTML =
`<img src="${atual.imagem}" alt="${atual.titulo}">`;

document.getElementById("btnProxima").disabled=false;
}

if(atual.tipo==="desafio"){
bits=[0,0,0,0,0,0,0,0];

document.getElementById("conteudo").innerHTML =
`
<img src="${atual.imagem}" alt="${atual.titulo}">
<div class="painel">
<h2>Meta: ${atual.meta}</h2>

<div class="bits" id="bits"></div>

<div class="grid" id="grid"></div>

<div id="resultado"></div>
</div>
`;

montar();
tocarMusica();
render();
}
}

function montar(){
let html="";
for(let i=0;i<valores.length;i++){
html += `
<div class="item" onclick="trocar(${i})">
<div class="valor">${valores[i]}</div>
<div class="estado" id="e${i}">0</div>
</div>
`;
}
document.getElementById("grid").innerHTML=html;
}

function trocar(i){
bits[i]=bits[i]?0:1;
render();
}

function render(){
document.getElementById("bits").innerHTML =
bits.map(b=>`<div class="bit">${b}</div>`).join("");

for(let i=0;i<bits.length;i++){
document.getElementById("e"+i).innerText = bits[i];
}

const meta = paginas[pagina].meta;
const total = soma();

if(total===meta){
document.getElementById("resultado").innerHTML =
`<h2 class="ok">✓ Correto! Valor ${total}</h2>`;
document.getElementById("btnProxima").disabled=false;
}else if(total > meta){
document.getElementById("resultado").innerHTML =
`<h2 style="color:#ef4444;">Potência excedida: ${total}</h2>`;
document.getElementById("btnProxima").disabled=true;
}else{
document.getElementById("resultado").innerHTML =
`<h2>Soma atual: ${total}</h2>`;
document.getElementById("btnProxima").disabled=true;
}
}

function proxima(){
if(pagina<paginas.length-1){
pagina++;
atualizar();
window.scrollTo(0,0);
}
}

function voltar(){
if(pagina>0){
pagina--;
atualizar();
window.scrollTo(0,0);
}
}

atualizar();
</script>

</body>
</html>
